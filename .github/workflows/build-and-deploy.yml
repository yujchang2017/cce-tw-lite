name: Build & Deploy to GitHub Pages

# 觸發條件:
#   1. push 到 main → 立即重 build & deploy
#   2. 每日 06:00 UTC (台灣 14:00) 跑一次,確保教案內容更新時 < 24h 同步
#   3. 手動觸發
#   4. (進階) 教案 repo push 時透過 repository_dispatch 觸發
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [packages-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build packages index (fetch from cce-teaching-packages)
        run: node ../scripts/build-packages-index.mjs
        env:
          PACKAGES_REPO: ${{ vars.PACKAGES_REPO || 'yujchang2017/cce-teaching-packages' }}
          PACKAGES_BRANCH: ${{ vars.PACKAGES_BRANCH || 'main' }}

      - name: Build Next.js (static export)
        run: npm run build
        env:
          # 有 custom domain 就不要 basePath,沒設才用 /<repo>/ 路徑
          NEXT_PUBLIC_BASE_PATH: ${{ vars.CUSTOM_DOMAIN != '' && '' || '/cce-tw-lite' }}
          NEXT_PUBLIC_FORM_URL: ${{ vars.NEXT_PUBLIC_FORM_URL }}
          NEXT_PUBLIC_FORM_ENTRY_KEY_ID: ${{ vars.NEXT_PUBLIC_FORM_ENTRY_KEY_ID }}
          NEXT_PUBLIC_DISCUSSIONS_URL: ${{ vars.NEXT_PUBLIC_DISCUSSIONS_URL }}

      - name: Add CNAME for custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > out/CNAME

      - name: Add .nojekyll (避免 GitHub Pages 處理 _next 資料夾)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
